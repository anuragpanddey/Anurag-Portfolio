<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" role="img" aria-labelledby="title desc">
  <title id="title">Service Placeholder</title>
  <desc id="desc">A dark gradient placeholder card for service previews.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a2a2a" />
      <stop offset="100%" stop-color="#151515" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6a3d" />
      <stop offset="100%" stop-color="#ff3d00" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" />
  <circle cx="650" cy="130" r="120" fill="#ffffff08" />
  <circle cx="170" cy="470" r="160" fill="#ffffff06" />
  <rect x="80" y="80" width="640" height="20" rx="10" fill="#ffffff14" />
  <rect x="80" y="130" width="500" height="14" rx="7" fill="#ffffff12" />
  <rect x="80" y="160" width="420" height="14" rx="7" fill="#ffffff10" />
  <rect x="80" y="460" width="240" height="10" rx="5" fill="url(#accent)" />
</svg>
